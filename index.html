<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marduk_F</title>

  <!-- IMPORTANT: relative paths ONLY -->
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

  <header class="topbar">
    <h1>Marduk_F™</h1>
    <div class="live">● LIVE</div>
  </header>

  <section class="page">

    <!-- PIU DIAL -->
    <div class="dial-container">
      <div class="dial">
        <div class="dial-inner">
          <div>PIU</div>
          <div id="piuValue">--%</div>
        </div>
      </div>
    </div>

    <!-- GAUGES -->
    <div class="gauges">

      <div class="gauge blue">
        COHERENCE
        <div class="bar" id="cohBar"></div>
      </div>

      <div class="gauge yellow">
        SIGNAL
        <div class="bar" id="sigBar"></div>
      </div>

      <div class="gauge red">
        LOAD
        <div class="bar" id="loadBar"></div>
      </div>

      <div class="gauge green">
        GREEN
        <div class="bar" id="greenBar"></div>
      </div>

    </div>

    <!-- DISPLAY -->
    <div class="display">
      <p id="line1">> WAITING...</p>
      <p id="line2"></p>
      <p id="line3"></p>
    </div>

  </section>

</div>

<script src="app.js"></script>
</body>
</html>
