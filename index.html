<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marduk_F</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

  <header class="top-bar">
    <div class="logo-section">
      <h1>Marduk_F™</h1>
      <p class="tagline">Real-Time Field Interface System</p>
    </div>
  </header>

  <main class="container">

    <section class="panel">
      <h2>Live System State</h2>

      <p id="coherence">Coherence: --</p>
      <p id="status">Status: --</p>
      <p id="mode">Mode: --</p>

    </section>

    <section class="panel">
      <h2>System Console</h2>
      <div class="console">
        <p>> Waiting for collector.c...</p>
        <p>> Connecting telemetry stream...</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Marduk_F™ v1.0 — Real-Time Field Engine</p>
  </footer>

  <script src="app.js"></script>

</body>
</html>
